<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォートナイト精霊チェックリスト</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght=700;900&display=swap');

        :root {
            --primary-color: #00d2ff;
            --secondary-color: #ff007f;
            --accent-color: #ffeb3b;
            --level-color: #9c27b0; 
            --bg-gradient-start: #e0f7ff;
            --bg-gradient-end: #d1c4e9;
            --card-bg: #ffffff;
            --text-color: #2a1b4e;

            /* レアリティカラー */
            --rarity-mythic: #e5c100;       
            --rarity-legendary: #ff9800;  
            --rarity-epic: #9c27b0;       
            --rarity-rare: #2196f3;       
        }

        /* 動く虹色のグラデーションアニメーション */
        @keyframes rainbow-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rarity-special-bg {
            background: linear-gradient(120deg, #ff007f, #ff9800, #ffeb3b, #00ffcc, #00d2ff, #7928ca, #ff007f);
            background-size: 300% 300%;
            animation: rainbow-move 6s ease infinite;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 700;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-color);
            padding: 15px 5px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 
                3px 3px 0px #2a1b4e, 
                -1px -1px 0px #2a1b4e,  
                1px -1px 0px #2a1b4e,  
                -1px 1px 0px #2a1b4e,  
                1px 1px 0px #2a1b4e;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
            margin-top: 140px; 
        }

        .controls-container {
            width: max-content; 
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px; 
            border-radius: 20px;
            border: 3px solid var(--text-color);
            position: fixed;
            top: 15px;
            z-index: 11;
            display: flex;
            flex-wrap: wrap; 
            gap: 8px; 
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0px rgba(42, 27, 78, 0.15);
        }

        .control-item {
            padding: 6px 12px;
            font-size: 0.85rem;
            border: 2px solid var(--text-color);
            border-radius: 50px;
            outline: none;
            background: #fff;
            color: var(--text-color);
            cursor: pointer;
        }

        .search-input {
            width: 140px; 
        }

        .search-input:focus, .control-select:focus {
            border-color: var(--primary-color);
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 1650px; 
            box-shadow: 0 6px 0px rgba(42, 27, 78, 0.15);
            border: 4px solid var(--primary-color);
            margin-bottom: 25px; 
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .gauge-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .progress-text {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            height: 27px; 
        }

        .max-gold {
            font-weight: 900;
            font-size: 1.3rem;
            background: linear-gradient(180deg, #ffd700 0%, #ff8f00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            padding-left: 2px;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .progress-bar-bg {
            background: #e0e0e0;
            border-radius: 50px;
            height: 18px;
            width: 100%;
            overflow: hidden;
            border: 3px solid var(--text-color);
            position: relative;
        }

        .progress-bar-fill-check {
            background: linear-gradient(90deg, #00ffcc, var(--primary-color));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: inset 0 -4px 0px rgba(0,0,0,0.1);
        }

        .progress-bar-fill-level {
            background: linear-gradient(90deg, #ea80fc, var(--level-color));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: inset 0 -4px 0px rgba(0,0,0,0.1);
        }

        .progress-bar-fill-crown {
            background: linear-gradient(90deg, #ff9800, var(--accent-color));
            height: 100%;
            width: 0%;
            transition: width 0.4s ease-out;
            box-shadow: inset 0 -4px 0px rgba(0,0,0,0.1);
        }

        .checklist {
            width: 100%;
            max-width: 1650px; 
            display: grid;
            grid-template-columns: repeat(8, minmax(120px, 1fr)); 
            gap: 12px; 
            justify-content: center;
            margin-top: 0; 
        }

        .item-card {
            background: linear-gradient(180deg, #ffffff 0%, #f1edfa 100%);
            border-radius: 15px; 
            padding: 10px 10px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            align-items: center;
            border: 4px solid var(--rarity-rare); 
            box-shadow: 0 5px 0px rgba(42, 27, 78, 0.15); 
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            height: 250px; 
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .item-card.hidden {
            display: none !important;
        }

        /* ★修正部分：ホバー時に大きくなったり浮き上がったりしないように変更 ★ */
        .item-card:hover {
            transform: none;
            box-shadow: 0 5px 0px rgba(42, 27, 78, 0.15); 
        }

        .item-card.checked {
            background: linear-gradient(180deg, #fff9fc 0%, #faeef5 100%);
        }

        .item-image-container {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .item-image {
            width: 95%; 
            height: 65%; 
            object-fit: contain; 
            margin-bottom: 15px; 
        }

        .item-name {
            font-size: 0.85rem; 
            color: var(--text-color);
            word-break: break-all;
            line-height: 1.2;
            user-select: none;
            text-align: center;
            width: 100%;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 6px;
            padding: 2px 0;
        }

        .card-badges {
            display: flex;
            gap: 4px; 
            width: 100%;
            justify-content: center;
            margin-bottom: auto; 
        }

        .badge {
            font-size: 0.6rem; 
            padding: 2px 4px; 
            border-radius: 4px;
            color: #fff;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.3);
        }

        .badge-style {
            background: #444;
        }

        .card-controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: auto; 
            padding-top: 4px;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 4px; 
        }

        .right-controls {
            display: flex;
            align-items: center;
            opacity: 0.15;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .item-card.checked .right-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .custom-checkbox {
            width: 24px; 
            height: 24px; 
            border: 2px solid var(--text-color);
            background: #fff;
            border-radius: 6px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem; 
            color: transparent;
            transition: background 0.2s, color 0.2s;
            box-shadow: 0 2px 0px rgba(42, 27, 78, 0.1), 
            cursor: pointer;
        }

        .item-card.checked .custom-checkbox {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
            color: #fff;
        }

        .crown-btn {
            background: #e0e0e0;
            border: 2px solid #9e9e9e;
            font-size: 0.8rem; 
            padding: 2px 0;
            border-radius: 8px; 
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: grayscale(100%); 
            opacity: 0.15;
            pointer-events: none;
            width: 32px; 
            height: 24px; 
        }

        .item-card.checked .crown-btn {
            opacity: 0.5;
            pointer-events: auto;
        }

        .crown-btn.active {
            background: #ffeb3b; 
            border-color: #ff9800; 
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(255, 235, 59, 0.6); 
            filter: grayscale(0%);
            opacity: 1 !important;
        }

        .fav-btn {
            background: #e0e0e0;
            border: 2px solid #9e9e9e;
            font-size: 0.8rem;
            padding: 2px 0;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 24px;
        }

        .fav-btn.active {
            background: #ffebee;
            border-color: #ff4081;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(255, 64, 129, 0.3);
        }

        .level-select {
            background: #fff;
            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 2px; 
            border-radius: 8px; 
            outline: none;
            cursor: pointer;
            font-size: 0.75rem; 
            width: 58px; 
            text-align: center;
            box-shadow: 0 1px 0px rgba(0, 210, 255, 0.2);
        }

        /* -------------------------------------------
           📱 レスポンシブ＆スマホ最適化表示（画像位置調整版）
        ------------------------------------------- */
        @media (max-width: 1200px) {
            .checklist {
                grid-template-columns: repeat(6, minmax(120px, 1fr));
            }
        }

        @media (max-width: 900px) {
            .checklist {
                grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
                gap: 8px; 
            }
        }

        @media (max-width: 768px) {
            .item-card {
                height: auto; 
                min-height: 210px; 
                border-radius: 12px;
                padding: 8px;
                box-shadow: 0 3px 0px rgba(42, 27, 78, 0.15); 
            }

            /* --- スマホのときだけ画像コンテナの位置をさらに上（top: -5px）に引き上げる --- */
            .item-card .item-image-container {
                top: -5px;
            }

            /* --- 画像サイズを少し小さく（height: 55%）してボタンと被らないように調整 --- */
            .item-card .item-image {
                height: 55%;
                margin-bottom: 0;
            }

            .progress-container {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }

            h1 {
                margin-top: 210px; 
                font-size: 1.8rem;
            }

            .controls-container {
                width: 95%; 
                padding: 6px 10px;
                gap: 5px;
            }

            .control-item {
                padding: 4px 8px;
                font-size: 0.75rem;
            }

            .search-input {
                width: 110px;
            }

            .progress-text {
                font-size: 0.95rem;
                height: auto;
            }

            .item-name {
                font-size: 0.7rem;
                padding: 1px 0;
            }

            .card-badges {
                flex-wrap: wrap; 
                gap: 2px;
            }

            .badge {
                font-size: 0.5rem;
                padding: 1px 3px;
            }

            .card-controls-row {
                flex-direction: column;
                gap: 6px;
                width: 100%;
                align-items: center;
            }

            .left-controls {
                justify-content: center;
                width: 100%;
                gap: 6px;
            }

            .right-controls {
                width: 100%;
                justify-content: center;
            }

            .custom-checkbox {
                width: 22px;
                height: 22px;
                font-size: 0.7rem;
                border-radius: 5px;
            }

            .crown-btn {
                width: 26px;
                height: 22px;
                font-size: 0.7rem;
                border-radius: 6px;
            }

            .fav-btn {
                width: 26px;
                height: 22px;
                font-size: 0.7rem;
                border-radius: 6px;
            }

            .level-select {
                width: 80px; 
                height: 22px;
                font-size: 0.7rem;
                padding: 0 4px;
                border-radius: 6px;
            }
        }
    </style>
</head>

        <input type="text" class="control-item search-input" id="search-box" placeholder="名前で検索...">
        
        <select class="control-item control-select" id="filter-rarity">
            <option value="all">すべてのレアリティ</option>
            <option value="special">スペシャル</option>
            <option value="mythic">ミシック</option>
            <option value="legendary">レジェンダリー</option>
            <option value="epic">エピック</option>
            <option value="rare">レア</option>
        </select>

        <select class="control-item control-select" id="filter-style">
            <option value="all">すべてのスタイル</option>
            <option value="デフォルト">デフォルト</option>
            <option value="ゴールド">ゴールド</option>
            <option value="グミ">グミ</option>
            <option value="ギャラクシー">ギャラクシー</option>
        </select>

        <select class="control-item control-select" id="filter-status">
            <option value="all">すべての精霊</option>
            <option value="fav">お気に入り</option>
            <option value="not-fav">お気に入りしてない</option>
            <option value="crown">マスター済み</option>
            <option value="not-crown">マスターしてない</option>
            <option value="checked">✓ 抽出済み</option>
            <option value="not-checked">✖ 抽出していない</option>
        </select>

        <select class="control-item control-select" id="sort-select">
            <option value="default">並び替え：タイプ順</option>
            <option value="style-asc">並び替え：スタイル順</option>
        </select>
    </div>

    <h1>FORTNITE SPRITE</h1>

    <div class="progress-container">

            <div class="progress-bar-bg">

        </div>
    </div>

        spirits.push({ id: 57, spiritId: "spirit57", name: "ギャラクシー ボスの精霊ギャラクシー", rarity: "special", style: "ギャラクシー", image: "ボスの精霊ギャラクシー.webp", maxLevel: 5 });
        spirits.push({ id: 58, spiritId: "spirit58", name: "死の精霊", rarity: "mythic", style: "デフォルト", image: "死の精霊.webp", maxLevel: 5 });
        spirits.push({ id: 59, spiritId: "spirit59", name: "ゴールド 死の精霊", rarity: "special", style: "ゴールド", image: "死の精霊ゴールド.webp", maxLevel: 5 });
        spirits.push({ id: 60, spiritId: "spirit60", name: "グミ 死の精霊", rarity: "special", style: "グミ", image: "死の精霊グミ.webp", maxLevel: 5 });
        spirits.push({ id: 61, spiritId: "spirit61", name: "ギャラクシー 死の精霊", rarity: "special", style: "ギャラクシー", image: "死の精霊ギャラクシー.webp", maxLevel: 5 });

        // 初期レベルを 0 からスタートするように調整
        let savedData = JSON.parse(localStorage.getItem('fortniteSpiritsData')) || {};
        const checklistContainer = document.getElementById('checklist');
        let cardElements = [];

        spirits.forEach(spirit => {
            const itemData = savedData[spirit.spiritId] || { checked: false, level: 0, crown: false, favorite: false };

            if (itemData.level > spirit.maxLevel) {
                itemData.level = spirit.maxLevel;
            }

            const card = document.createElement('div');
            card.className = `item-card ${itemData.checked ? 'checked' : ''}`;
            card.dataset.spiritId = spirit.spiritId;
            card.dataset.id = spirit.id;
            card.dataset.name = spirit.name.toLowerCase();
            card.dataset.rarity = spirit.rarity;
            card.dataset.style = spirit.style;
            card.dataset.rarityWeight = rarityWeights[spirit.rarity];
            card.dataset.styleWeight = styleWeights[spirit.style];
            card.dataset.favorite = itemData.favorite ? "true" : "false";
            
            if (spirit.rarity === 'special') {
                card.style.border = "4px solid transparent";
                card.style.backgroundImage = "linear-gradient(180deg, #ffffff 0%, #f1edfa 100%), linear-gradient(120deg, #ff007f, #ff9800, #ffeb3b, #00ffcc, #00d2ff, #7928ca, #ff007f)";
                card.style.backgroundOrigin = "border-box";
                card.style.backgroundClip = "padding-box, border-box";
                card.style.backgroundSize = "100% 100%, 300% 300%";
                card.style.animation = "rainbow-move 6s ease infinite";
            } else {
                card.style.borderColor = `var(--rarity-${spirit.rarity})`;
            }

            let imageHTML = '';
            if (spirit.image) {
                imageHTML = `
                    <div class="item-image-container">
                        <img src="${spirit.image}" class="item-image" alt="${spirit.name}">
                    </div>
                `;
            }

            const badgeClass = spirit.rarity === 'special' ? 'badge rarity-special-bg' : 'badge';
            const badgeStyle = spirit.rarity === 'special' ? '' : `style="background:var(--rarity-${spirit.rarity})"`;

            // ループを lv = 0 から開始に変更
            let levelOptionsHTML = '';
            for (let lv = 0; lv <= spirit.maxLevel; lv++) {
                levelOptionsHTML += `<option value="${lv}" ${itemData.level == lv ? 'selected' : ''}>Lv.${lv}</option>`;
            }

            card.innerHTML = `
                ${imageHTML}
                <span class="item-name">${spirit.name}</span>
                <div class="card-badges">
                    <span class="${badgeClass}" ${badgeStyle}>${rarityNames[spirit.rarity]}</span>
                    <span class="badge badge-style">${spirit.style}</span>
                </div>
                <div class="card-controls-row">
                    <div class="left-controls">
                        <div class="custom-checkbox">✓</div>
                        <button class="crown-btn ${itemData.crown ? 'active' : ''}">👑</button>
                        <button class="fav-btn ${itemData.favorite ? 'active' : ''}">${itemData.favorite ? '❤️' : '🤍'}</button>
                    </div>
                    <div class="right-controls">
                        <select class="level-select">
                            ${levelOptionsHTML}
                        </select>
                    </div>
                </div>
            `;

            const checkbox = card.querySelector('.custom-checkbox');
            checkbox.addEventListener('click', () => {
                card.classList.toggle('checked');
                if (!card.classList.contains('checked')) {
                    card.querySelector('.crown-btn').classList.remove('active');
                }
                
                if (spirit.rarity === 'special') {
                    const isChecked = card.classList.contains('checked');
                    const bgStart = isChecked ? '#fff9fc' : '#ffffff';
                    const bgEnd = isChecked ? '#faeef5' : '#f1edfa';
                    card.style.backgroundImage = `linear-gradient(180deg, ${bgStart} 0%, ${bgEnd} 100%), linear-gradient(120deg, #ff007f, #ff9800, #ffeb3b, #00ffcc, #00d2ff, #7928ca, #ff007f)`;
                }
                
                saveToStorage();
                updateProgress();
                applyFilters();
            });

            if (spirit.rarity === 'special' && itemData.checked) {
                card.style.backgroundImage = "linear-gradient(180deg, #fff9fc 0%, #faeef5 100%), linear-gradient(120deg, #ff007f, #ff9800, #ffeb3b, #00ffcc, #00d2ff, #7928ca, #ff007f)";
            }

            const select = card.querySelector('.level-select');
            select.addEventListener('change', () => {
                card.dataset.currentLevel = select.value;
                saveToStorage();
                updateProgress(); 
            });
            card.dataset.currentLevel = itemData.level;

            const crownBtn = card.querySelector('.crown-btn');
            crownBtn.addEventListener('click', () => {
                crownBtn.classList.toggle('active');
                saveToStorage();
                updateProgress(); 
                applyFilters();
            });

            const favBtn = card.querySelector('.fav-btn');
            favBtn.addEventListener('click', () => {
                const isFav = card.dataset.favorite === "true";
                if (isFav) {
                    card.dataset.favorite = "false";
                    favBtn.textContent = "🤍";
                    favBtn.classList.remove('active');
                } else {
                    card.dataset.favorite = "true";
                    favBtn.textContent = "❤️";
                    favBtn.classList.add('active');
                }
                saveToStorage();
                applyFilters(); 
            });

            checklistContainer.appendChild(card);
            cardElements.push(card);
        });

        const searchBox = document.getElementById('search-box');
        const filterRarity = document.getElementById('filter-rarity');
        const filterStyle = document.getElementById('filter-style');
        const filterStatus = document.getElementById('filter-status');

        function applyFilters() {
            const searchKeyword = searchBox.value.toLowerCase().trim();
            const selectedRarity = filterRarity.value;
            const selectedStyle = filterStyle.value;
            const selectedStatus = filterStatus.value;

            cardElements.forEach(card => {
                const isChecked = card.classList.contains('checked');
                const isCrown = card.querySelector('.crown-btn').classList.contains('active');
                const isFav = card.dataset.favorite === "true";

                const matchSearch = card.dataset.name.includes(searchKeyword);
                const matchRarity = (selectedRarity === 'all' || card.dataset.rarity === selectedRarity);
                const matchStyle = (selectedStyle === 'all' || card.dataset.style === selectedStyle);
                
                let matchStatus = true;
                if (selectedStatus === 'fav') matchStatus = isFav;
                else if (selectedStatus === 'not-fav') matchStatus = !isFav;
                else if (selectedStatus === 'crown') matchStatus = isCrown;
                else if (selectedStatus === 'not-crown') matchStatus = !isCrown;
                else if (selectedStatus === 'checked') matchStatus = isChecked;
                else if (selectedStatus === 'not-checked') matchStatus = !isChecked;

                if (matchSearch && matchRarity && matchStyle && matchStatus) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        }

        searchBox.addEventListener('input', applyFilters);
        filterRarity.addEventListener('change', applyFilters);
        filterStyle.addEventListener('change', applyFilters);
        filterStatus.addEventListener('change', applyFilters);

        const sortSelect = document.getElementById('sort-select');
        sortSelect.addEventListener('change', () => {
            const method = sortSelect.value;

            cardElements.sort((a, b) => {
                if (method === 'style-asc') {
                    return parseInt(a.dataset.styleWeight) - parseInt(b.dataset.styleWeight) || parseInt(a.dataset.id) - parseInt(b.dataset.id);
                } else {
                    return parseInt(a.dataset.id) - parseInt(b.dataset.id);
                }
            });

            cardElements.forEach(card => checklistContainer.appendChild(card));
        });

        function updateProgress() {
            const total = spirits.length;
            
            let maxLevelSum = 0;
            spirits.forEach(spirit => {
                maxLevelSum += spirit.maxLevel;
            });
            
            const checkedCount = document.querySelectorAll('.item-card.checked').length;
            const crownCount = document.querySelectorAll('.crown-btn.active').length;
            
            let levelSum = 0;
            document.querySelectorAll('.level-select').forEach(select => {
                levelSum += parseInt(select.value, 10);
            });
            
            const checkPercent = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
            const crownPercent = checkedCount > 0 ? Math.round((crownCount / checkedCount) * 100) : 0;
            
            let isAllMax = true;
            document.querySelectorAll('.item-card').forEach(card => {
                const selectId = card.dataset.spiritId;
                const sp = spirits.find(s => s.spiritId === selectId);
                const currentVal = parseInt(card.querySelector('.level-select').value, 10);
                if (sp && currentVal !== sp.maxLevel) {
                    isAllMax = false;
                }
            });

            const levelPercent = isAllMax ? 100 : (maxLevelSum > 0 ? Math.round((levelSum / maxLevelSum) * 100) : 0);

            const displayBoxCheck = document.getElementById('num-display-check');
            if (checkPercent === 100) {
                displayBoxCheck.innerHTML = `<span class="max-gold">MAX</span>`;
            } else {
                displayBoxCheck.textContent = `${checkedCount} / ${total}`;
            }

            const displayBoxCrown = document.getElementById('num-display-crown');
            if (crownPercent === 100 && checkedCount === total) {
                displayBoxCrown.innerHTML = `<span class="max-gold">MAX</span>`;
            } else {
                displayBoxCrown.textContent = `${crownCount} / ${checkedCount}`;
            }

            const displayBoxLevel = document.getElementById('num-display-level');
            if (isAllMax) {
                displayBoxLevel.innerHTML = `<span class="max-gold">MAX</span>`;
            } else {
                displayBoxLevel.textContent = `${levelSum} / ${maxLevelSum}`;
            }

            document.getElementById('progress-bar-check').style.width = `${checkPercent}%`;
            document.getElementById('progress-bar-crown').style.width = `${crownPercent}%`;
            document.getElementById('progress-bar-level').style.width = `${levelPercent}%`;
        }

        function saveToStorage() {
            const dataToSave = {};
            cardElements.forEach(card => {
                const spiritId = card.dataset.spiritId;
                const checked = card.classList.contains('checked');
                const level = card.querySelector('.level-select').value;
                const crown = card.querySelector('.crown-btn').classList.contains('active');
                const favorite = card.dataset.favorite === "true";

                dataToSave[spiritId] = { checked, level, crown, favorite };
            });
            localStorage.setItem('fortniteSpiritsData', JSON.stringify(dataToSave));
        }

        saveToStorage();
        updateProgress();
        applyFilters();
    </script>
